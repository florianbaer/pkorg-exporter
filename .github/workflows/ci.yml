name: ci
on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun test
      - run: bun run build
      - name: Package Chrome extension
        run: cd dist/chrome && zip -r ../../pkorg-exporter-chrome.zip .
      - name: Package Firefox extension
        run: cd dist/firefox && zip -r ../../pkorg-exporter-firefox.zip .
      - uses: actions/upload-artifact@v4
        with:
          name: pkorg-exporter-chrome
          path: pkorg-exporter-chrome.zip
      - uses: actions/upload-artifact@v4
        with:
          name: pkorg-exporter-firefox
          path: pkorg-exporter-firefox.zip
      - name: Verify tag is on main
        if: startsWith(github.ref, 'refs/tags/v')
        id: verify
        run: |
          git fetch --no-tags origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "on-main=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $GITHUB_REF_NAME is not on main — skipping release."
            echo "on-main=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v') && steps.verify.outputs.on-main == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mv pkorg-exporter-chrome.zip "pkorg-exporter-chrome-${GITHUB_REF_NAME}.zip"
          mv pkorg-exporter-firefox.zip "pkorg-exporter-firefox-${GITHUB_REF_NAME}.zip"
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            "pkorg-exporter-chrome-${GITHUB_REF_NAME}.zip" \
            "pkorg-exporter-firefox-${GITHUB_REF_NAME}.zip"
